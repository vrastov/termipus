<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Настройки сервера</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: sans-serif;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .buttons {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      cursor: pointer;
    }
    #save-btn {
      background-color: #2E7D32;
      color: white;
    }
    #save-btn:hover {
      background-color: #1B5E20;
    }
    #close-btn {
      background-color: #616161;
      color: white;
    }
    #close-btn:hover {
      background-color: #424242;
    }
    .message {
      margin-top: 12px;
      font-size: 14px;
    }
    .error {
      color: red;
    }
    .success {
      color: green;
    }
  </style>
</head>
<body>
  <label for="server-url">Адрес WebSocket сервера:</label>
  <input type="text" id="server-url" placeholder="ws://localhost:8080/terminal">
  <div class="buttons">
    <button id="save-btn">Сохранить</button>
    <button id="close-btn">Закрыть</button>
  </div>
  <div id="message" class="message"></div>
  <script src="popup.js"></script>
</body>
</html>
